name: ETL CI/CD Pipeline

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

jobs:
  etl-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Registry
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build ETL image
      run: |
        docker build -t ${{ secrets.DOCKER_REGISTRY }}/etl-scheduler:${{ github.sha }} \
          ./backend/python_app/etl_project

    - name: Deploy to staging
      if: github.event.inputs.environment == 'staging' || github.event.schedule
      run: |
        docker-compose up -d etl-scheduler
        
    - name: Deploy to production
      if: github.event.inputs.environment == 'production'
      run: |
        docker-compose up -d etl-scheduler

    - name: Run ETL health check
      run: |
        sleep 30
        docker-compose exec etl-scheduler python scripts/health_check.py

    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: always()
