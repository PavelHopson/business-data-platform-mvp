version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Используем BuildKit для ускорения
      args:
        - BUILDKIT_INLINE_CACHE=1
      # Кэшируем слои
      cache_from:
        - node:18-alpine
    container_name: frontend-build
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_OPTIONS=--max-old-space-size=4096
    # Ограничиваем ресурсы для сборки
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
